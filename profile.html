<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <!-- Strict Compliance: Form designed in Bootstrap for page responsiveness -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card card-custom p-4 shadow-sm border-0">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                        <h2 class="h4 fw-bold mb-0">User Profile</h2>
                        <button type="button" id="logoutAction" class="btn btn-sm btn-outline-danger px-3">Logout</button>
                    </div>
                    
                    <!-- Alert box for success/error messages -->
                    <div id="statusAlert" class="alert d-none transition-fade" role="alert"></div>
                    
                    <form id="profileForm" novalidate>
                        <div class="row g-3">
                            <!-- ADDED: Name Entry -->
                            <div class="col-12">
                                <label for="name" class="form-label small fw-medium text-secondary">Full Name</label>
                                <input type="text" class="form-control py-2" id="name" required>
                            </div>
                            
                            <div class="col-12 col-sm-6">
                                <label for="age" class="form-label small fw-medium text-secondary">Age</label>
                                <input type="number" class="form-control py-2" id="age" required min="1" max="120">
                            </div>
                            <div class="col-12 col-sm-6">
                                <label for="dob" class="form-label small fw-medium text-secondary">Date of Birth</label>
                                <input type="date" class="form-control py-2" id="dob" required>
                            </div>
                            <div class="col-12">
                                <label for="contact" class="form-label small fw-medium text-secondary">Contact Number</label>
                                <input type="tel" class="form-control py-2" id="contact" required>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="button" id="saveProfileBtn" class="btn btn-success w-100 py-2 mt-3">Save Profile</button>
                            </div>
                        </div>
                    </form>

                    <!-- ADDED: Return to Login Path (Hidden by default, shown by JS on success) -->
                    <div id="postSaveActions" class="mt-4 text-center d-none">
                        <hr class="mb-4">
                        <p class="text-muted small mb-2">Profile updated successfully.</p>
                        <button type="button" id="returnLoginBtn" class="btn btn-outline-primary px-4 py-2 fw-medium">Return to Login Page</button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Strict Compliance: jQuery loaded for DOM manipulations and AJAX -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Strict Compliance: JS code strictly in a separate file -->
    <script src="js/profile.js"></script>
</body>
</html>
