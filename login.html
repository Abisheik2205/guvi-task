<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="card card-custom p-4 shadow-sm border-0">
                    <h2 class="h4 text-center fw-bold mb-4">Login Portal</h2>
                    <div id="statusAlert" class="alert d-none transition-fade" role="alert"></div>
                    
                    <form id="loginForm" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label small fw-medium text-secondary">Account Email</label>
                            <input type="email" class="form-control py-2" id="email" required autocomplete="email">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small fw-medium text-secondary">Account Password</label>
                            <input type="password" class="form-control py-2" id="password" required autocomplete="current-password">
                        </div>
                        <button type="button" id="loginBtn" class="btn btn-primary w-100 py-2">Login</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <span class="small text-muted">New User?</span>
                        <a href="register.html" class="small text-decoration-none ms-1">Create an account</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
